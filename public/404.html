<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>404 - Dayess</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#020202;color:#fff;font-family:Poppins,sans-serif}.box{width:min(740px,92vw);border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.55);padding:32px}.code{font-size:11px;letter-spacing:.35em;color:#94a3b8;text-transform:uppercase}h1{margin:10px 0;font-size:clamp(28px,4vw,52px)}p{color:#cbd5e1;line-height:1.6}.loader{position:relative;width:96px;height:96px;margin:24px 0}.ring{position:absolute;inset:0;border:1px solid rgba(255,255,255,.2);border-top-color:rgba(255,154,60,.85);border-radius:999px;animation:spin 1.2s linear infinite}.glyph{position:absolute;inset:0;display:grid;place-items:center;font-weight:700;font-size:42px}.btn{border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;padding:10px 18px;text-decoration:none;font-size:13px;letter-spacing:.1em;text-transform:uppercase}.btn:hover{border-color:rgba(255,255,255,.55)}@keyframes spin{to{transform:rotate(360deg)}}</style></head>
  <body><section class="box"><div class="code">404</div><h1>Page Not Found</h1><p>The page you requested is unavailable or has been moved.</p><div class="loader"><div class="ring"></div><div class="glyph">D</div></div><a class="btn" href="/">Back Home</a></section></body>
</html>
